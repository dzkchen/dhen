# Done to increase the memory available to gradle.
org.gradle.jvmargs=-Xmx1G
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Build toolchain
# Kotlin version used by the JVM and serialization plugins (see settings.gradle.kts).
kotlin_version=2.4.0
# Java version for the toolchain, JavaCompile release, and the fabric.mod.json java dependency.
java_version=25

# Fabric Properties
# check these on https://fabricmc.net/develop
minecraft_version=26.2
loader_version=0.19.3
loom_version=1.17-SNAPSHOT
fabric_kotlin_version=1.13.12+kotlin.2.4.0

# Mod Properties
mod_version=1.0.0
maven_group=io.github.dzkchen.dhen

# Dependencies
fabric_api_version=0.153.0+26.2
modmenu_version=20.0.0-alpha.1
yacl_version=3.9.5+26.2-fabric
